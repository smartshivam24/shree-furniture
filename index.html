<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Shree Furniture</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="Shree Furniture.png">
    <link rel="stylesheet" href="bussiness.css">
</head>
<body>
    <header>
        <h1 onclick="showPage('home-page')">SHREE FURNITURE🪑</h1>
        <nav>
            <button onclick="showPage('cart-page')">🛒 Cart (<span id="cart-count">0</span>)</button>
        </nav>
    </header>

    <main>
        <section id="home-page" class="page active">
            <h2>SHOP BY CATEGORY</h2>
            <div class="grid-container">
                <div class="card" onclick="openCategory('beds')">
                    <img src="Beds/Double Bed  (56).jpg" alt="Beds">
                    <button class="category-btn">Beds</button>
                </div>
                <div class="card" onclick="openCategory('center-tables')">
                    <img src="Center Tables/Table (3).jpg" alt="Center Tables">
                    <button class="category-btn">Center Tables</button>
                </div>
                <div class="card" onclick="openCategory('dining-tables')">
                    <img src="Dining Table/Dining (5).jpg" alt="Dining Tables with Chairs">
                    <button class="category-btn">Dining Tables</button>
                </div>
                <div class="card" onclick="openCategory('dressing-tables')">
                    <img src="Dressing Table/Dressing (1).jpg" alt="Dressing Tables">
                    <button class="category-btn">Dressing Tables</button>
                </div>
                <div class="card" onclick="openCategory('sofas')">
                    <img src="Sofa/Sofa Sets (34).jpg" alt="Sofas">
                    <button class="category-btn">Sofas</button>
                </div>
            </div>
        </section>

        <section id="products-page" class="page">
            <button onclick="showPage('home-page')" class="back-btn">← Back to Categories</button>
            <input type="text" id="search-input" class="search-bar" onkeyup="filterProducts()" placeholder="🔍 Search for a product...">
            <h2 id="category-title">Products</h2>
            <div id="products-container" class="grid-container"></div>
        </section>

        <section id="product-view-page" class="page">
            <button onclick="showPage('products-page')" class="back-btn">← Back to Products</button>
            <div id="product-details-container"></div>
        </section>

        <section id="cart-page" class="page">
            <button onclick="showPage('home-page')" class="back-btn">← Back to Home</button>
            <h2>Your Shopping Cart</h2>
            <div id="cart-container"></div>
        </section>
    </main>

    <script src="bussiness.js"></script>
</body>
</html>
